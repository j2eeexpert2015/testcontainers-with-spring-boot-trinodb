services:
  postgres:
    image: postgres:14-alpine
    container_name: trino-postgres
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  trino:
    image: trinodb/trino:latest
    container_name: trino-server
    ports:
      - "8080:8080"
    volumes:
      - ./trino-catalog:/etc/trino/catalog
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trino-spring-app
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TRINO_URL=trino:8080
      - TRINO_USER=trino
      - TRINO_CATALOG=postgresql
      - TRINO_SCHEMA=public
    ports:
      - "8081:8080"
    depends_on:
      trino:
        condition: service_healthy
    restart: on-failure